<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia Docente Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#32aded">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">

    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">

    <style>
        :root {
            --ios-sky-blue: #32aded;
            --ios-sky-blue-hover: #1c94d4;
            --ios-bg-body: #f1f8fe;
            --ios-container: rgba(255, 255, 255, 0.85);
            --ios-border: rgba(148, 163, 184, 0.2);
            --ios-text-primary: #1c3d6c;
            --ios-text-secondary: #64748b;
            --ios-btn-bg: #e2e8f0;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--ios-text-secondary);
            background: radial-gradient(circle at center, #ffffff 0%, #d4e8f9 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            max-width: 650px;
            margin: 20px auto;
            padding: 25px;
            background-color: var(--ios-container);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--ios-border);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--ios-sky-blue);
        }

        .logo {
            max-width: 160px;
            height: auto;
        }

        .btn-config {
            position: absolute;
            top: 10px;
            right: 15px;
            background-color: #f1f5f9;
            border: 1px solid var(--ios-border);
            border-radius: 12px;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px 12px;
            z-index: 1000;
        }

        .filtros, .config-section {
            display: flex;
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 25px;
        }

        label {
            font-weight: 700;
            color: var(--ios-text-primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="text"] {
            padding: 14px;
            border-radius: 14px;
            border: 2px solid #eef2f6;
            font-size: 1rem;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }

        .alumno-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eef2f6;
        }

        .botones-estado {
            display: flex;
            background-color: var(--ios-btn-bg);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            background-color: transparent;
            color: #718096;
        }

        .btn.activo { 
            background-color: var(--ios-sky-blue); 
            color: white; 
        }

        .btn-accion {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-primario { background-color: var(--ios-sky-blue); color: white; }
        .btn-secundario { background-color: #1a3a5a; color: white; margin-top: 10px; }
        .btn-peligro { background-color: #fed7d7; color: #9b2c2c; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="pantalla-asistencia">
            <div class="header">
                <img src="logo.png" alt="Sistema Asistencia" class="logo">
                <button class="btn-config" onclick="togglePantallas()">⚙️</button>
            </div>

            <div class="filtros">
                <label>Institución</label>
                <select id="select-escuela" onchange="cargarCursos()"></select>
                <label>Curso / División</label>
                <select id="select-curso" onchange="cargarAlumnosAsistencia()" disabled></select>
            </div>

            <div id="lista-alumnos"></div>

            <div style="margin-top: 25px;">
                <button class="btn-accion btn-primario" onclick="guardarAsistencia()" style="display: none;" id="btn-guardar">Guardar Clase 💾</button>
                <button class="btn-accion btn-secundario" onclick="descargarExcel()">Exportar a Excel 📊</button>
            </div>
        </div>

        <div id="pantalla-config" style="display: none;">
            <div class="header">
                <h2 style="color: var(--ios-text-primary); margin: 0;">Panel de Control IT</h2>
                <button class="btn-accion btn-primario" style="padding:10px; width:auto; margin-top:10px;" onclick="togglePantallas()">⬅️ Volver</button>
            </div>

            <div class="config-section">
                <label>1. Agregar Escuelas</label>
                <input type="text" id="input-nueva-escuela" placeholder="Nombre Institución">
                <button class="btn-accion btn-primario" onclick="agregarEscuela()">+ Guardar</button>
            </div>

            <div class="config-section">
                <label>2. Agregar Cursos</label>
                <select id="config-select-escuela" onchange="actualizarListasConfig()"></select>
                <input type="text" id="input-nuevo-curso" placeholder="Ej: 1ro A">
                <button class="btn-accion btn-primario" onclick="agregarCurso()">+ Guardar</button>
            </div>

            <div class="config-section">
                <label>3. Cargar Alumnos</label>
                <select id="config-select-curso" onchange="mostrarAlumnosConfig()"></select>
                <input type="text" id="input-nuevo-alumno" placeholder="Nombre Alumno" onkeypress="if(event.key==='Enter')agregarAlumno()">
                <button class="btn-accion btn-primario" onclick="agregarAlumno()">+ Agregar</button>
                <div id="lista-config-alumnos" style="margin-top:15px; border:1px solid #eee; border-radius:10px;"></div>
            </div>

            <button class="btn-accion btn-peligro" onclick="borrarTodaLaBase()">⚠️ Reiniciar Todo</button>
        </div>
    </div>

    <script>
        let estructuraDB = JSON.parse(localStorage.getItem('EstructuraEscuelas_Pro_iOS')) || {};

        function togglePantallas() {
            const asistencia = document.getElementById("pantalla-asistencia");
            const config = document.getElementById("pantalla-config");
            if (asistencia.style.display === "none") {
                asistencia.style.display = "block";
                config.style.display = "none";
                cargarSelectEscuelasPrincipal(); 
            } else {
                asistencia.style.display = "none";
                config.style.display = "block";
                actualizarListasConfig();
            }
        }

        function actualizarListasConfig() {
            const selEsc = document.getElementById("config-select-escuela");
            const valEsc = selEsc.value;
            selEsc.innerHTML = '<option value="">Elegir...</option>';
            for (let e in estructuraDB) selEsc.innerHTML += `<option value="${e}">${e}</option>`;
            selEsc.value = valEsc;

            const selCur = document.getElementById("config-select-curso");
            selCur.innerHTML = '<option value="">Elegir...</option>';
            if (valEsc && estructuraDB[valEsc]) {
                for (let c in estructuraDB[valEsc]) selCur.innerHTML += `<option value="${c}">${c}</option>`;
            }
            mostrarAlumnosConfig();
        }

        function agregarEscuela() {
            const n = document.getElementById("input-nueva-escuela").value.trim().toUpperCase();
            if (!n) return;
            estructuraDB[n] = {}; 
            localStorage.setItem('EstructuraEscuelas_Pro_iOS', JSON.stringify(estructuraDB));
            document.getElementById("input-nueva-escuela").value = "";
            actualizarListasConfig();
        }

        function agregarCurso() {
            const e = document.getElementById("config-select-escuela").value;
            const c = document.getElementById("input-nuevo-curso").value.trim();
            if (!e || !c) return;
            estructuraDB[e][c] = []; 
            localStorage.setItem('EstructuraEscuelas_Pro_iOS', JSON.stringify(estructuraDB));
            document.getElementById("input-nuevo-curso").value = "";
            actualizarListasConfig();
        }

        function agregarAlumno() {
            const e = document.getElementById("config-select-escuela").value;
            const c = document.getElementById("config-select-curso").value;
            const i = document.getElementById("input-nuevo-alumno");
            const a = i.value.trim();
            if (!e || !c || !a) return;
            estructuraDB[e][c].push(a);
            estructuraDB[e][c].sort(); 
            localStorage.setItem('EstructuraEscuelas_Pro_iOS', JSON.stringify(estructuraDB));
            i.value = ""; i.focus();
            mostrarAlumnosConfig();
        }

        function mostrarAlumnosConfig() {
            const e = document.getElementById("config-select-escuela").value;
            const c = document.getElementById("config-select-curso").value;
            const d = document.getElementById("lista-config-alumnos");
            d.innerHTML = "";
            if (e && c && estructuraDB[e][c]) {
                estructuraDB[e][c].forEach((al, idx) => {
                    d.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">${al} <b style="color:red; cursor:pointer;" onclick="borrarAl('${e}','${c}',${idx})">X</b></div>`;
                });
            }
        }

        function borrarAl(e, c, i) {
            estructuraDB[e][c].splice(i, 1);
            localStorage.setItem('EstructuraEscuelas_Pro_iOS', JSON.stringify(estructuraDB));
            mostrarAlumnosConfig();
        }

        function cargarSelectEscuelasPrincipal() {
            const s = document.getElementById("select-escuela");
            s.innerHTML = '<option value="">Elegir Institución...</option>';
            for (let e in estructuraDB) s.innerHTML += `<option value="${e}">${e}</option>`;
        }

        function cargarCursos() {
            const e = document.getElementById("select-escuela").value;
            const s = document.getElementById("select-curso");
            s.innerHTML = '<option value="">Elegir Curso...</option>';
            if (e && estructuraDB[e]) {
                s.disabled = false;
                for (let c in estructuraDB[e]) s.innerHTML += `<option value="${c}">${c}</option>`;
            } else { s.disabled = true; }
        }

        function cargarAlumnosAsistencia() {
            const e = document.getElementById("select-escuela").value;
            const c = document.getElementById("select-curso").value;
            const d = document.getElementById("lista-alumnos");
            const b = document.getElementById("btn-guardar");
            d.innerHTML = '';
            if (e && c && estructuraDB[e][c]) {
                estructuraDB[e][c].forEach(al => {
                    const card = document.createElement("div");
                    card.className = "alumno-card";
                    card.innerHTML = `<div class="alumno-nombre" style="font-weight:700; margin-bottom:10px;">${al}</div>
                        <div class="botones-estado">
                            <button class="btn presente activo" onclick="marcarE(this)">P</button>
                            <button class="btn ausente" onclick="marcarE(this)">A</button>
                            <button class="btn tarde" onclick="marcarE(this)">T</button>
                        </div>
                        <input type="text" placeholder="Notas..." style="padding:8px; border-radius:8px; border:1px solid #eee; width:100%; box-sizing:border-box;" class="in-nota">`;
                    d.appendChild(card);
                });
                b.style.display = 'block';
            }
        }

        function marcarE(bt) {
            const bts = bt.parentElement.querySelectorAll('.btn');
            bts.forEach(x => x.classList.remove('activo'));
            bt.classList.add('activo');
        }

        function guardarAsistencia() {
            const esc = document.getElementById("select-escuela").value;
            const cur = document.getElementById("select-curso").value;
            const cards = document.querySelectorAll('.alumno-card');
            const f = new Date().toLocaleDateString('es-AR');
            const h = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            let asis = [];
            cards.forEach(ca => {
                const n = ca.querySelector('.alumno-nombre').innerText;
                const e = ca.querySelector('.btn.activo').innerText === 'P' ? 'Presente' : (ca.querySelector('.btn.activo').innerText === 'T' ? 'Tarde' : 'Ausente');
                const nt = ca.querySelector('.in-nota').value.replace(/;/g, '');
                asis.push({ f, h, esc, cur, n, e, nt });
            });
            let db = JSON.parse(localStorage.getItem('AsistenciaDB')) || [];
            localStorage.setItem('AsistenciaDB', JSON.stringify(db.concat(asis)));
            alert("Guardado local ✅");
            document.getElementById("lista-alumnos").innerHTML = "";
            document.getElementById("btn-guardar").style.display = "none";
        }

        function descargarExcel() {
            let db = JSON.parse(localStorage.getItem('AsistenciaDB')) || [];
            if (!db.length) return alert("Sin datos");
            let csv = "Fecha;Hora;Escuela;Curso;Alumno;Estado;Notas\n";
            db.forEach(r => csv += `${r.f};${r.h};"${r.esc}";"${r.cur}";"${r.n}";"${r.e}";"${r.nt}"\n`);
            let bl = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            let l = document.createElement("a");
            l.href = URL.createObjectURL(bl);
            l.download = `Asis_${f.replace(/\//g, '-')}.csv`;
            l.click();
        }

        function borrarTodaLaBase() {
            if(confirm("¿Borrar todo?")) { estructuraDB = {}; localStorage.setItem('EstructuraEscuelas_Pro_iOS', JSON.stringify(estructuraDB)); actualizarListasConfig(); }
        }

        window.onload = cargarSelectEscuelasPrincipal;
    </script>
</body>
</html>
